<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1 Access Floorplan Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>B1 ACCESS - INTERACTIVE FLOOR MAP</h1>
        <p>Select a workspace zone to view details.</p>
    </header>

    <div class="container">

        <div class="map-section">

            <img src="assets/simplified-floorplan.jpeg" class="floorplan">

            <button class="zone bay05"
                onclick="showZone('Open Bay 05','102 Desks','Available')">
                
            </button>
            
            <button class="zone bay09"
                onclick="showZone('Open Bay 09','81 Desks','Available')"> 
            </button>

            <button class="zone bay08"
                onclick="showZone('Open Bay 08','138 Desks','Available')">
                
            </button>

            <button class="zone conference"
                onclick="showZone('Conference Room','3 Rooms','Available')">
                
            </button>

            <button class="zone bay01"
onclick="showZone('Open Bay 01','92 Desks','Available')"></button>

<button class="zone bay06"
onclick="showZone('Open Bay 06','73 Desks','Available')"></button>

<button class="zone bay07"
onclick="showZone('Open Bay 07','55 Desks','Available')"></button>

<button class="zone bay02"
onclick="showZone('Open Bay 02','35 Desks','Available')"></button>

            

        </div>

        <div class="info-panel">

            <h2 id="zoneTitle">Select a Zone</h2>

            <p id="zoneDesks">Click any highlighted area.</p>

<p id="zoneCapacity"></p>

<p id="zoneAmenities"></p>

            <p id="zoneStatus"></p>
            <button id="bookBtn" onclick="bookZone()">
        Book Now
    </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
